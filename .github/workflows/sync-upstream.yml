name: Sync Upstream

on:
  schedule:
    - cron: '20 2 * * *' # 每天 UTC 02:20（北京时间 10:20）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve parent repo
        id: parent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PARENT=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}" | jq -r '.parent.full_name // empty')

          if [ -z "$PARENT" ]; then
            echo "This repository has no parent (not a fork?)." >&2
            exit 1
          fi

          echo "parent=$PARENT" >> "$GITHUB_OUTPUT"
          echo "Upstream parent: $PARENT"

      - name: Sync default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PARENT_REPO: ${{ steps.parent.outputs.parent }}
        run: |
          git remote add upstream "https://github.com/${PARENT_REPO}.git"
          git fetch upstream

          git checkout "$DEFAULT_BRANCH"

          # 仅允许 fast-forward，避免覆盖 fork 上的独立提交
          git merge --ff-only "upstream/${DEFAULT_BRANCH}" || {
            echo "Fast-forward failed: local branch has diverged from upstream." >&2
            echo "Please resolve manually (rebase/merge) then rerun workflow." >&2
            exit 1
          }

          git push origin "$DEFAULT_BRANCH"
